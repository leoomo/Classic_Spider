name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Classic Spider v__VERSION__'
          releaseBody: |
            ## Classic Spider v__VERSION__

            经典蜘蛛纸牌游戏 - Windows 版本

            ### 下载说明
            - **MSI 安装包** (`*.msi`): 适合企业部署
            - **NSIS 安装包** (`*_setup.exe`): 适合个人用户

            ### 系统要求
            - Windows 10 或更高版本
          releaseDraft: true
          prerelease: false
          bundler: 'msi,nsis'
